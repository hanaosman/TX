<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رادار أدوات الذكاء الاصطناعي · AI Tools Radar</title>
  <meta name="description" content="تحديثات أسبوعية لأحدث أدوات الذكاء الاصطناعي وميزاتها واستخداماتها الموصى بها — منصة داخلية." />

  <!-- design tokens + component styles -->
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="assets/radar.css" />

  <!-- Phosphor icons (the AEGov icon library) -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/fill/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/duotone/style.css" />

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot { min-height: 100vh; display: grid; place-items: center; color: var(--fg-3); font-family: var(--font-base-ar); gap: 14px; }
    #boot .b-emblem { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(140deg, var(--aegold-400), var(--aegold-600)); display: grid; place-items: center; color: #fff; font-size: 28px; box-shadow: var(--shadow-md); }
    #boot .b-emblem i { animation: spin 1.4s linear infinite; }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div id="boot">
      <div class="b-emblem"><i class="ph-bold ph-radar"></i></div>
      <div>جارٍ تحميل رادار أدوات الذكاء الاصطناعي…</div>
    </div>
  </div>

  <!-- data + engine (plain JS) -->
  <script src="assets/sources.js"></script>
  <script src="assets/dataset.js"></script>
  <script src="assets/logos.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/update-engine.js"></script>
  <script src="assets/videos.js"></script>

  <!-- UI (Babel/JSX) — order matters: tweaks → primitives → sections → app -->
  <script type="text/babel" src="assets/tweaks-panel.jsx"></script>
  <script type="text/babel" src="assets/components.jsx"></script>
  <script type="text/babel" src="assets/videos.jsx"></script>
  <script type="text/babel" src="assets/admin.jsx"></script>
  <script type="text/babel" src="assets/sections.jsx"></script>
  <script type="text/babel" src="assets/app.jsx"></script>

  <!-- thumbnail for offline bundling -->
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#1B1D21"/>
      <circle cx="50" cy="50" r="26" fill="none" stroke="#CBA344" stroke-width="3"/>
      <circle cx="50" cy="50" r="15" fill="none" stroke="#92722A" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="4" fill="#CBA344"/>
      <line x1="50" y1="50" x2="72" y2="34" stroke="#CBA344" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </template>
</body>
</html>
