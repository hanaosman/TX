<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رادار أدوات الذكاء الاصطناعي · AI Tools Radar</title>
  <meta name="description" content="تحديثات أسبوعية لأحدث أدوات الذكاء الاصطناعي وميزاتها واستخداماتها الموصى بها — منصة داخلية." />

  <!-- design tokens + component styles -->
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="assets/radar.css" />

  <!-- Phosphor icons (the AEGov icon library) -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/fill/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/duotone/style.css" />

  <style>
    @keyframes rm-spin { to { transform: rotate(360deg); } }
    @keyframes rm-blip { 0%, 100% { opacity: .25; transform: scale(.7); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes rm-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    @keyframes rm-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    #boot { position: fixed; inset: 0; display: grid; place-items: center; z-index: 9999;
      background:
        radial-gradient(120% 120% at 84% -10%, var(--aegold-100) 0%, transparent 46%),
        radial-gradient(80% 95% at -6% 4%, var(--aegold-50) 0%, transparent 44%),
        linear-gradient(180deg, var(--bg-surface, #fff) 0%, var(--bg-page, #fcfcfc) 78%); }
    [dir="rtl"] #boot { font-family: var(--font-base-ar); }
    #boot .b-inner { display: flex; flex-direction: column; align-items: center; gap: 26px; animation: rm-fade .6s ease both; }

    /* radar scope */
    #boot .b-scope { position: relative; width: 156px; height: 156px; border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 33%, color-mix(in srgb, var(--aegold-600) 26%, transparent) 33% calc(33% + 1.5px), transparent calc(33% + 1.5px) 65%, color-mix(in srgb, var(--aegold-600) 26%, transparent) 65% calc(65% + 1.5px), transparent calc(65% + 1.5px) 100%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--aegold-50) 70%, #fff), #fff 72%);
      border: 1.5px solid color-mix(in srgb, var(--aegold-600) 38%, transparent);
      box-shadow: 0 20px 44px -20px rgba(146,114,42,.45), inset 0 0 24px rgba(146,114,42,.06); }
    /* crosshair */
    #boot .b-scope::before { content: ""; position: absolute; inset: 0; border-radius: 50%;
      background:
        linear-gradient(color-mix(in srgb, var(--aegold-600) 22%, transparent), color-mix(in srgb, var(--aegold-600) 22%, transparent)) center / 1.5px 100% no-repeat,
        linear-gradient(color-mix(in srgb, var(--aegold-600) 22%, transparent), color-mix(in srgb, var(--aegold-600) 22%, transparent)) center / 100% 1.5px no-repeat; }
    /* rotating sweep beam */
    #boot .b-sweep { position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
      -webkit-mask: radial-gradient(circle, #000 99%, transparent 100%); mask: radial-gradient(circle, #000 99%, transparent 100%); }
    #boot .b-sweep::after { content: ""; position: absolute; inset: -25%; border-radius: 50%;
      background: conic-gradient(from 0deg, color-mix(in srgb, var(--aegold-500) 62%, transparent) 0deg, color-mix(in srgb, var(--aegold-500) 8%, transparent) 38deg, transparent 70deg);
      transform-origin: center; animation: rm-spin 2s linear infinite; }
    /* center + blips */
    #boot .b-dot { position: absolute; top: 50%; left: 50%; width: 9px; height: 9px; margin: -4.5px; border-radius: 50%; background: var(--aegold-600); box-shadow: 0 0 0 4px color-mix(in srgb, var(--aegold-600) 18%, transparent); }
    #boot .b-blip { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--aegold-600); animation: rm-blip 2s ease-in-out infinite; }
    #boot .b-blip.b1 { top: 30%; right: 26%; }
    #boot .b-blip.b2 { bottom: 30%; left: 30%; width: 6px; height: 6px; animation-delay: .9s; }

    #boot .b-title { font: 800 21px/1.3 var(--font-heading-ar, sans-serif); color: var(--fg-1, #232528); text-align: center; }
    #boot .b-title b { color: var(--aegold-700); }
    #boot .b-cap { font-size: 13.5px; color: var(--fg-3, #6b7075); margin-top: -14px; }
    /* indeterminate progress bar */
    #boot .b-bar { width: 190px; height: 4px; border-radius: 9999px; background: color-mix(in srgb, var(--aegold-600) 14%, transparent); overflow: hidden; }
    #boot .b-bar::before { content: ""; display: block; width: 26%; height: 100%; border-radius: 9999px; background: linear-gradient(90deg, var(--aegold-400), var(--aegold-600)); animation: rm-bar 1.35s cubic-bezier(.5,0,.5,1) infinite; }

    @media (prefers-reduced-motion: reduce) {
      #boot .b-sweep::after, #boot .b-blip, #boot .b-bar::before { animation: none; }
    }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div id="boot">
      <div class="b-inner">
        <div class="b-scope">
          <div class="b-sweep"></div>
          <span class="b-blip b1"></span>
          <span class="b-blip b2"></span>
          <span class="b-dot"></span>
        </div>
        <div class="b-title">رادار أدوات <b>الذكاء الاصطناعي</b></div>
        <div class="b-cap">جارٍ التحميل…</div>
        <div class="b-bar"></div>
      </div>
    </div>
  </div>

  <!-- data + engine (plain JS) -->
  <script src="assets/sources.js"></script>
  <script src="assets/dataset.js"></script>
  <script src="assets/logos.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/update-engine.js"></script>
  <script src="assets/videos.js"></script>

  <!-- UI (Babel/JSX) — order matters: tweaks → primitives → sections → app -->
  <script type="text/babel" src="assets/tweaks-panel.jsx"></script>
  <script type="text/babel" src="assets/components.jsx"></script>
  <script type="text/babel" src="assets/videos.jsx"></script>
  <script type="text/babel" src="assets/admin.jsx"></script>
  <script type="text/babel" src="assets/sections.jsx"></script>
  <script type="text/babel" src="assets/app.jsx"></script>

  <!-- thumbnail for offline bundling -->
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#1B1D21"/>
      <circle cx="50" cy="50" r="26" fill="none" stroke="#CBA344" stroke-width="3"/>
      <circle cx="50" cy="50" r="15" fill="none" stroke="#92722A" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="4" fill="#CBA344"/>
      <line x1="50" y1="50" x2="72" y2="34" stroke="#CBA344" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </template>
</body>
</html>
